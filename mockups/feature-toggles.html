<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fram3d — Feature Toggles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1a;
  color: #ccc;
  font-family: -apple-system, 'Segoe UI', Roboto, monospace;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Control panel ── */
#controls {
  width: 320px;
  min-width: 320px;
  background: #222;
  border-right: 1px solid #3c3c3c;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#controls-header {
  padding: 14px 16px;
  background: #1e1e1e;
  border-bottom: 1px solid #3c3c3c;
}
#controls-header h1 {
  font-size: 14px;
  font-weight: 600;
  color: #ddd;
  margin-bottom: 4px;
}
#controls-header p {
  font-size: 10px;
  color: #666;
  line-height: 1.4;
}
#controls-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
}

/* Milestone groups */
.milestone-group {
  margin-bottom: 6px;
}
.milestone-header {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.1s;
  gap: 10px;
}
.milestone-header:hover { background: rgba(255,255,255,0.03); }
.milestone-toggle {
  position: relative;
  width: 44px;
  height: 24px;
  background: #333;
  border-radius: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
  border: 1px solid #444;
}
.milestone-toggle.on {
  background: #4a7a4a;
  border-color: #5a9a5a;
}
.milestone-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  background: #888;
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.milestone-toggle.on::after {
  transform: translateX(20px);
  background: #afd8a0;
}
.milestone-name {
  font-size: 14px;
  font-weight: 600;
  color: #bbb;
  flex: 1;
}
.milestone-count {
  font-size: 11px;
  color: #555;
}

/* Individual features */
.feature-list {
  padding: 0 16px 0 52px;
}
.feature-item {
  display: flex;
  align-items: center;
  padding: 6px 0;
  gap: 10px;
}
.feature-toggle {
  position: relative;
  width: 36px;
  height: 20px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
  border: 1px solid #444;
}
.feature-toggle.on {
  background: #3a6a3a;
  border-color: #4a8a4a;
}
.feature-toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: #777;
  border-radius: 50%;
  transition: transform 0.15s, background 0.15s;
}
.feature-toggle.on::after {
  transform: translateX(16px);
  background: #9ac88a;
}
.feature-name {
  font-size: 12px;
  color: #999;
  flex: 1;
}
.feature-section {
  font-size: 10px;
  color: #555;
  font-variant-numeric: tabular-nums;
}

/* Quick actions */
#quick-actions {
  padding: 10px 16px;
  border-top: 1px solid #3c3c3c;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.quick-btn {
  background: #333;
  color: #888;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 7px 14px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
}
.quick-btn:hover { background: #444; color: #bbb; }

/* ── Preview iframe ── */
#preview {
  flex: 1;
  border: none;
  background: #232323;
}
</style>
</head>
<body>

<div id="controls">
  <div id="controls-header">
    <h1>Feature Toggles</h1>
    <p>Toggle individual features or entire milestones to see how the UI grows over time.</p>
  </div>
  <div id="controls-body"></div>
  <div id="quick-actions">
    <button class="quick-btn" onclick="setAll(true)">Enable All</button>
    <button class="quick-btn" onclick="setAll(false)">Disable All</button>
    <button class="quick-btn" onclick="enableUpTo('1.1')">Up to 1.1</button>
    <button class="quick-btn" onclick="enableUpTo('1.2')">Up to 1.2</button>
    <button class="quick-btn" onclick="enableUpTo('1.3')">Up to 1.3</button>
    <button class="quick-btn" onclick="enableUpTo('1.4')">Up to 1.4</button>
    <button class="quick-btn" onclick="enableUpTo('1.5')">Up to 1.5</button>
    <button class="quick-btn" onclick="enableUpTo('1.6')">Up to 1.6</button>
    <button class="quick-btn" onclick="enableUpTo('3.6')">All milestones</button>
  </div>
</div>

<iframe id="preview" src="global-timeline.html"></iframe>

<script>
// Milestone display names
const MILESTONE_NAMES = {
  '1.1': 'Virtual Camera',
  '1.2': 'Camera Overlays',
  '1.3': 'Scene Management',
  '1.4': 'Shot Sequencer',
  '1.5': 'Keyframe Animation',
  '1.6': 'Input System',
  '3.3': 'Object Linking',
  '3.5': 'Selection Refinements',
  '3.6': 'Multi-camera',
};

// Milestone ordering for "up to" buttons
const MILESTONE_ORDER = ['1.1', '1.2', '1.3', '1.4', '1.5', '1.6', '3.3', '3.5', '3.6'];

let iframeFeatures = null;
let iframeWindow = null;

const preview = document.getElementById('preview');
preview.addEventListener('load', () => {
  iframeWindow = preview.contentWindow;
  iframeFeatures = iframeWindow.FEATURES;
  buildControls();
});

function buildControls() {
  const body = document.getElementById('controls-body');
  body.innerHTML = '';

  // Group features by milestone
  const groups = {};
  for (const [id, f] of Object.entries(iframeFeatures)) {
    if (!groups[f.milestone]) groups[f.milestone] = [];
    groups[f.milestone].push({ id, ...f });
  }

  MILESTONE_ORDER.forEach(ms => {
    const features = groups[ms];
    if (!features) return;

    const group = document.createElement('div');
    group.className = 'milestone-group';

    // Milestone header with toggle
    const header = document.createElement('div');
    header.className = 'milestone-header';

    const toggle = document.createElement('div');
    toggle.className = 'milestone-toggle' + (features.every(f => f.enabled) ? ' on' : '');
    toggle.dataset.milestone = ms;
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const allOn = features.every(f => iframeFeatures[f.id].enabled);
      features.forEach(f => {
        iframeFeatures[f.id].enabled = !allOn;
      });
      syncToIframe();
      buildControls();
    });

    const name = document.createElement('div');
    name.className = 'milestone-name';
    name.textContent = `${ms} — ${MILESTONE_NAMES[ms] || ms}`;

    const count = document.createElement('div');
    count.className = 'milestone-count';
    const onCount = features.filter(f => f.enabled).length;
    count.textContent = `${onCount}/${features.length}`;

    header.appendChild(toggle);
    header.appendChild(name);
    header.appendChild(count);
    group.appendChild(header);

    // Individual features
    const list = document.createElement('div');
    list.className = 'feature-list';

    features.forEach(f => {
      const item = document.createElement('div');
      item.className = 'feature-item';

      const ft = document.createElement('div');
      ft.className = 'feature-toggle' + (f.enabled ? ' on' : '');
      ft.addEventListener('click', () => {
        iframeFeatures[f.id].enabled = !iframeFeatures[f.id].enabled;
        syncToIframe();
        buildControls();
      });

      const fname = document.createElement('div');
      fname.className = 'feature-name';
      fname.textContent = f.name;

      const section = document.createElement('div');
      section.className = 'feature-section';
      section.textContent = f.section;

      item.appendChild(ft);
      item.appendChild(fname);
      item.appendChild(section);
      list.appendChild(item);
    });

    group.appendChild(list);
    body.appendChild(group);
  });
}

function syncToIframe() {
  if (iframeWindow && typeof iframeWindow.applyFeatureVisibility === 'function') {
    iframeWindow.applyFeatureVisibility();
  }
  if (iframeWindow && typeof iframeWindow.render === 'function') {
    iframeWindow.render();
  }
  // Re-populate panels in case link indicators / lights section changed
  if (iframeWindow && typeof iframeWindow.populateObjects === 'function') {
    iframeWindow.populateObjects();
  }
}

function setAll(enabled) {
  for (const f of Object.values(iframeFeatures)) {
    f.enabled = enabled;
  }
  syncToIframe();
  buildControls();
}

function enableUpTo(targetMs) {
  const targetIdx = MILESTONE_ORDER.indexOf(targetMs);
  for (const [id, f] of Object.entries(iframeFeatures)) {
    const msIdx = MILESTONE_ORDER.indexOf(f.milestone);
    f.enabled = msIdx <= targetIdx;
  }
  syncToIframe();
  buildControls();
}
</script>
</body>
</html>
