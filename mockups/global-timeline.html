<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fram3d — UI Mockup</title>
<link rel="stylesheet" href="global-timeline.css">
<link rel="stylesheet" href="panels.css">
</head>
<body>

<!-- ── Main area: gutters + sidebars + center ── -->
<div id="main-row">

  <!-- Left gutter -->
  <div class="gutter left">
    <button class="gutter-tab" data-panel="overview">Overview</button>
    <button class="gutter-tab" data-panel="objects">Objects</button>
    <button class="gutter-tab" data-panel="assets">Assets</button>
  </div>

  <!-- Left sidebar: Objects -->
  <div id="objects-panel" class="side-panel left hidden">
    <div class="panel-header">Objects</div>
    <div class="panel-body" id="objects-list"></div>
  </div>

  <!-- Left sidebar: Assets -->
  <div id="assets-panel" class="side-panel left hidden">
    <div class="panel-header">
      Assets
      <span class="panel-header-right">
        <input type="text" class="panel-search" placeholder="Search...">
      </span>
    </div>
    <div class="panel-body" id="assets-grid"></div>
  </div>

  <!-- Center column: overview + viewport -->
  <div id="center-column">
    <div id="minimap-container">
      <div id="minimap-label">Overview</div>
      <div id="minimap">
        <div id="minimap-shots"></div>
        <div id="minimap-tracks"></div>
        <div id="minimap-view-window"></div>
        <div id="minimap-playhead"></div>
      </div>
    </div>

    <div id="viewport">
      <div class="placeholder">
        3D Viewport<br>
        <span style="font-size:11px;color:#555">(camera view would render here)</span>
      </div>
      <div id="viewport-shot-label"></div>
      <div id="viewport-timecode"></div>

      <!-- 1.1.7 Camera Info HUD -->
      <div id="viewport-hud" class="feature-1-1" style="display:none">
        <div class="hud-row"><span class="hud-key">Lens</span><span class="hud-val" id="hud-focal">50mm</span></div>
        <div class="hud-row"><span class="hud-key">Height</span><span class="hud-val" id="hud-height">1.6m</span></div>
        <div class="hud-row"><span class="hud-key">AOV</span><span class="hud-val" id="hud-aov">39.6°</span></div>
        <div class="hud-row"><span class="hud-key">Ratio</span><span class="hud-val" id="hud-ratio">16:9</span></div>
        <div class="hud-row"><span class="hud-key">Body</span><span class="hud-val" id="hud-body">Generic 35mm</span></div>
        <div class="hud-row"><span class="hud-key">Lens Set</span><span class="hud-val" id="hud-lensset">Generic Prime</span></div>
        <div class="hud-row hud-dof" style="display:none"><span class="hud-key">Aperture</span><span class="hud-val" id="hud-aperture">f/5.6</span></div>
      </div>

      <!-- 1.2.1 Aspect Ratio Masks -->
      <div id="aspect-mask-top" class="aspect-mask feature-1-2" style="display:none"></div>
      <div id="aspect-mask-bottom" class="aspect-mask feature-1-2" style="display:none"></div>
      <div id="aspect-mask-left" class="aspect-mask feature-1-2" style="display:none"></div>
      <div id="aspect-mask-right" class="aspect-mask feature-1-2" style="display:none"></div>

      <!-- 1.2.2 Frame Guides -->
      <svg id="viewport-guides" class="feature-1-2" style="display:none">
        <!-- Rule of thirds -->
        <line class="guide-thirds" x1="33.33%" y1="0" x2="33.33%" y2="100%"/>
        <line class="guide-thirds" x1="66.66%" y1="0" x2="66.66%" y2="100%"/>
        <line class="guide-thirds" x1="0" y1="33.33%" x2="100%" y2="33.33%"/>
        <line class="guide-thirds" x1="0" y1="66.66%" x2="100%" y2="66.66%"/>
        <!-- Center cross -->
        <line class="guide-center" x1="48%" y1="50%" x2="52%" y2="50%"/>
        <line class="guide-center" x1="50%" y1="48%" x2="50%" y2="52%"/>
        <!-- Safe zones -->
        <rect class="guide-safe-title" x="5%" y="5%" width="90%" height="90%" rx="1"/>
        <rect class="guide-safe-action" x="3.5%" y="3.5%" width="93%" height="93%" rx="1"/>
      </svg>

      <!-- 1.3.2 Tool Mode Badge -->
      <div id="tool-mode-badge" class="feature-1-3" style="display:none">
        <span id="tool-mode-icon">◇</span>
        <span id="tool-mode-label">SELECT</span>
        <span id="tool-mode-key">Q</span>
      </div>

      <!-- 1.3.5 Director View Badge -->
      <div id="director-badge" class="feature-1-3" style="display:none">DIRECTOR VIEW</div>

      <!-- 1.5.6 Camera Path Badge -->
      <div id="camera-path-badge" class="feature-1-5" style="display:none">
        <span style="opacity:0.6">⟜</span> PATH
      </div>
    </div>
  </div>

  <!-- Right sidebar: Inspector -->
  <div id="inspector-panel" class="side-panel right">
    <div class="panel-header">Inspector</div>
    <div class="panel-body" id="inspector-content"></div>
  </div>

  <!-- Right gutter -->
  <div class="gutter right">
    <button class="gutter-tab" data-panel="inspector">Inspector</button>
  </div>

</div>

<!-- ── Bottom gutter + Timeline ── -->
<div class="gutter bottom">
  <button class="gutter-tab-h" data-panel="timeline">Timeline</button>
  <div class="gutter-spacer"></div>
  <!-- 1.4.4 Scenes switcher -->
  <div id="scenes-switcher" class="feature-1-4" style="display:none">
    <span id="scenes-label">Scene 1</span>
    <span class="scenes-arrow">▾</span>
  </div>
  <div class="gutter-spacer"></div>
  <!-- 1.4.2 Aggregate duration -->
  <span id="aggregate-duration" class="feature-1-4" style="display:none">Total: 90.0s</span>
  <div class="gutter-spacer"></div>
  <button id="btn-play" class="gutter-play">&#9654;</button>
</div>

<div id="timeline-section">
  <div id="timeline-panel">

    <!-- 1.5.1 Transport Bar -->
    <div id="transport-bar" class="feature-1-5" style="display:none">
      <button id="transport-play" class="transport-btn">▶</button>
      <span id="transport-time" class="transport-time">0.0</span>
      <span class="transport-divider">/</span>
      <span id="transport-duration" class="transport-time">90.0</span>
      <span id="transport-shot" class="transport-shot">Wide Establishing</span>
    </div>

    <!-- Ruler -->
    <div id="ruler-container">
      <div id="ruler-label"></div>
      <div id="ruler">
        <div id="playhead-ruler"></div>
      </div>
    </div>

    <!-- Shot Bar -->
    <div id="shot-bar-container">
      <div id="shot-bar-label">
        Shots
        <!-- 1.4.2 Add/Delete buttons -->
        <div id="shot-mgmt-buttons" class="feature-1-4" style="display:none">
          <button id="btn-add-shot" class="shot-mgmt-btn" title="Add Shot">+</button>
        </div>
      </div>
      <div id="shot-bar">
        <div id="shot-bar-view-range"></div>
        <div id="playhead-shotbar"></div>
      </div>
    </div>

    <!-- 3.6.4 Coverage Track -->
    <div id="coverage-container" class="feature-3-6" style="display:none">
      <div id="coverage-label">Coverage</div>
      <div id="coverage-track">
        <div id="playhead-coverage"></div>
      </div>
    </div>

    <!-- Track Area -->
    <div id="track-area-wrapper">
      <div id="track-labels"></div>
      <div id="track-area">
        <div id="playhead"></div>
      </div>
    </div>

    <!-- Zoom bar -->
    <div id="zoom-bar-container">
      <div id="zoom-bar-label"></div>
      <div id="zoom-bar">
        <div id="zoom-playhead-indicator"></div>
        <div id="zoom-thumb"></div>
      </div>
    </div>

    <!-- 1.5.1 Status Bar -->
    <div id="status-bar" class="feature-1-5" style="display:none">
      <span id="status-hints"></span>
    </div>
  </div>
</div>

<!-- Floating elements -->
<div id="resize-label"></div>
<div id="shot-tooltip" style="display:none"></div>

<script src="features.js"></script>
<script src="global-timeline.js"></script>
<script src="panels.js"></script>
</body>
</html>
